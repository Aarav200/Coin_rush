<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coin Rush: City Drive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Chakra+Petch:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0d1117; font-family:'Rajdhani', sans-serif; }
  #gameCanvas { display:block; width:100%; height:100%; }

  .hud { position:fixed; z-index:10; color:#f4e4c8; pointer-events:none; user-select:none; }

  .panel {
    background: linear-gradient(160deg, rgba(20,18,16,0.55), rgba(20,18,16,0.35));
    border: 1px solid rgba(244,198,120,0.25);
    backdrop-filter: blur(6px);
    border-radius: 10px;
  }

  #scoreHud { top:22px; left:22px; padding:10px 20px; }
  #scoreHud .label { font-size:11px; letter-spacing:3px; opacity:0.65; font-family:'Chakra Petch',sans-serif; }
  #scoreHud .value { font-family:'Chakra Petch',sans-serif; font-size:34px; font-weight:700; color:#ffd479; line-height:1.1; display:flex; align-items:center; gap:8px; }
  #scoreHud .value svg { width:22px; height:22px; }

  #speedHud { top:22px; right:22px; padding:10px 22px; text-align:right; }
  #speedHud .label { font-size:11px; letter-spacing:3px; opacity:0.65; font-family:'Chakra Petch',sans-serif; }
  #speedHud .value { font-family:'Chakra Petch',sans-serif; font-size:34px; font-weight:700; color:#f4e4c8; line-height:1.1; }
  #speedHud .unit { font-size:14px; opacity:0.6; margin-left:4px; }

  #distHud { top:96px; left:22px; padding:6px 20px; }
  #distHud .label { font-size:10px; letter-spacing:2px; opacity:0.55; font-family:'Chakra Petch',sans-serif; }
  #distHud .value { font-size:18px; font-weight:600; color:#e8d5b5; }

  #instructions {
    bottom:26px; left:50%; transform:translateX(-50%);
    padding:9px 22px; font-size:14px; letter-spacing:1px; color:#f4e4c8; opacity:0.85;
    transition:opacity 1s ease;
  }
  #instructions b { color:#ffd479; }

  #vignette {
    position:fixed; inset:0; pointer-events:none; z-index:5;
    box-shadow: inset 0 0 180px 40px rgba(0,0,0,0.55);
  }

  #popupLayer { position:fixed; inset:0; z-index:8; pointer-events:none; }
  .floatPopup {
    position:absolute; font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:20px;
    color:#ffe28a; text-shadow:0 0 8px rgba(255,200,80,0.8), 0 2px 4px rgba(0,0,0,0.6);
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0% { transform:translate(-50%,0) scale(0.6); opacity:0; }
    15% { opacity:1; transform:translate(-50%,-6px) scale(1.1); }
    100% { transform:translate(-50%,-70px) scale(1); opacity:0; }
  }

  #crashOverlay {
    position:fixed; inset:0; z-index:20; display:none;
    align-items:center; justify-content:center;
    background:radial-gradient(circle at center, rgba(30,10,10,0.55), rgba(5,3,2,0.88));
  }
  #crashCard {
    background:linear-gradient(160deg, rgba(28,22,18,0.9), rgba(14,11,9,0.92));
    border:1px solid rgba(244,198,120,0.35);
    border-radius:16px; padding:40px 50px; text-align:center; color:#f4e4c8;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  #crashCard h1 { font-family:'Chakra Petch',sans-serif; font-size:30px; color:#ff9d6b; letter-spacing:2px; margin-bottom:6px; }
  #crashCard p.sub { opacity:0.65; font-size:14px; margin-bottom:22px; letter-spacing:1px; }
  #crashCard .finalScore { font-family:'Chakra Petch',sans-serif; font-size:52px; font-weight:700; color:#ffd479; margin-bottom:4px; }
  #crashCard .finalScoreLabel { font-size:12px; letter-spacing:3px; opacity:0.6; margin-bottom:26px; }
  #restartBtn {
    pointer-events:all; cursor:pointer; border:none; outline:none;
    background:linear-gradient(160deg,#ffd479,#e8a83f); color:#241a0d;
    font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:16px; letter-spacing:1px;
    padding:14px 36px; border-radius:10px; transition:transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow:0 8px 20px rgba(232,168,63,0.3);
  }
  #restartBtn:hover { transform:translateY(-2px); box-shadow:0 12px 26px rgba(232,168,63,0.45); }

  #startOverlay {
    position:fixed; inset:0; z-index:25; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 40%, rgba(50,38,24,0.5), rgba(5,4,3,0.92));
  }
  #startCard {
    background:linear-gradient(160deg, rgba(28,22,18,0.9), rgba(14,11,9,0.92));
    border:1px solid rgba(244,198,120,0.35); border-radius:18px;
    padding:46px 56px; text-align:center; color:#f4e4c8; max-width:440px;
  }
  #startCard h1 { font-family:'Chakra Petch',sans-serif; font-size:34px; color:#ffd479; letter-spacing:1px; margin-bottom:10px; }
  #startCard p { font-size:15px; opacity:0.75; line-height:1.6; margin-bottom:26px; }
  #startCard .keys { display:flex; justify-content:center; gap:14px; margin-bottom:30px; font-family:'Chakra Petch',sans-serif; }
  #startCard .keyBtn { border:1px solid rgba(244,198,120,0.35); border-radius:8px; padding:8px 14px; font-size:13px; opacity:0.85; }
  #playBtn {
    pointer-events:all; cursor:pointer; border:none; outline:none;
    background:linear-gradient(160deg,#ffd479,#e8a83f); color:#241a0d;
    font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:17px; letter-spacing:1px;
    padding:16px 44px; border-radius:10px;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="vignette"></div>
<div id="popupLayer"></div>

<div class="hud panel" id="scoreHud">
  <div class="label">COINS</div>
  <div class="value">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#ffd479" stroke="#c98a1f" stroke-width="1.5"/><circle cx="12" cy="12" r="6" fill="none" stroke="#c98a1f" stroke-width="1"/></svg>
    <span id="scoreVal">0</span>
  </div>
</div>

<div class="hud panel" id="speedHud">
  <div class="label">SPEED</div>
  <div class="value"><span id="speedVal">0</span><span class="unit">KM/H</span></div>
</div>

<div class="hud panel" id="distHud">
  <div class="label">DISTANCE</div>
  <div class="value"><span id="distVal">0</span> m</div>
</div>

<div class="hud panel" id="instructions"><b>&uarr; W</b> gas &nbsp; <b>&darr; S</b> brake &nbsp; <b>&larr; A &rarr; D</b> steer &nbsp; — dodge traffic, grab coins</div>

<div id="crashOverlay">
  <div id="crashCard">
    <h1>CRASHED</h1>
    <p class="sub">watch the traffic next time</p>
    <div class="finalScore" id="finalScoreVal">0</div>
    <div class="finalScoreLabel">COINS COLLECTED</div>
    <button id="restartBtn">DRIVE AGAIN</button>
  </div>
</div>

<div id="startOverlay">
  <div id="startCard">
    <h1>COIN RUSH</h1>
    <p>Golden hour. Open road. Traffic ahead. Collect every coin you can before you wreck.</p>
    <div class="keys">
      <div class="keyBtn">W / &uarr; gas</div>
      <div class="keyBtn">S / &darr; brake</div>
      <div class="keyBtn">A D / &larr; &rarr; steer</div>
    </div>
    <button id="playBtn">START ENGINE</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function(){

// ---------- model config ----------
// Drop a real car model in and point this at it to replace the built-in
// procedural car. Leave blank ('') to keep the primitive low-poly car.
// Works with any .glb/.gltf — Kenney.nl's car packs (CC0) are a great free
// source: https://kenney.nl/assets?q=car
const CAR_MODEL_URL = './assets/car.glb'; // e.g. './assets/car.glb' or a hosted https:// URL
const CAR_MODEL_SCALE = 1.0;      // tweak if the model is too big/small
const CAR_MODEL_ROTATION_Y = 0;  // radians — rotate if model doesn't face -Z (forward)
const CAR_MODEL_Y_OFFSET = 0;     // shift up/down so wheels sit on the road

// ---------- basic setup ----------
const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
const skyTop = new THREE.Color(0x2a3d63);
const skyBottom = new THREE.Color(0xf3a25a);
scene.background = skyBottom.clone();
scene.fog = new THREE.Fog(0xe8926a, 40, 210);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth/window.innerHeight, 0.1, 500);

function resize(){
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// sky gradient via large sphere
(function(){
  const skyGeo = new THREE.SphereGeometry(400, 24, 16);
  const skyMat = new THREE.ShaderMaterial({
    uniforms:{ top:{value:skyTop}, bottom:{value:skyBottom} },
    vertexShader:`varying vec3 vPos; void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`varying vec3 vPos; uniform vec3 top; uniform vec3 bottom; void main(){ float h=normalize(vPos).y*0.5+0.5; gl_FragColor=vec4(mix(bottom,top,h),1.0); }`,
    side:THREE.BackSide
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));
})();

// lights - low warm sun, golden hour
const sun = new THREE.DirectionalLight(0xffcf9e, 1.3);
sun.position.set(-40, 35, -20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-60; sun.shadow.camera.right=60;
sun.shadow.camera.top=60; sun.shadow.camera.bottom=-60;
sun.shadow.camera.far=200;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x6b7aa8, 0.55));
const fill = new THREE.HemisphereLight(0xffcf9e, 0x33405f, 0.4);
scene.add(fill);

// ---------- helpers ----------
function windowTexture(color1, color2){
  const c = document.createElement('canvas'); c.width=64; c.height=128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = color1; ctx.fillRect(0,0,64,128);
  for(let y=6; y<128; y+=14){
    for(let x=6; x<64; x+=16){
      ctx.fillStyle = Math.random()<0.35 ? '#ffdb8a' : color2;
      ctx.fillRect(x,y,8,9);
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}
const buildingTexA = windowTexture('#2c3145','#1c2033');
const buildingTexB = windowTexture('#3a2f3a','#241c28');
const buildingTexC = windowTexture('#2a3540','#1a2228');

// ---------- road ----------
const ROAD_WIDTH = 14;
const LANE_X = [-4.5, 0, 4.5];
const SEGMENT_LEN = 60;
const SEGMENTS_AHEAD = 6;

const roadMat = new THREE.MeshStandardMaterial({ color:0x2b2b30, roughness:0.85, metalness:0.05 });
const lineMat = new THREE.MeshStandardMaterial({ color:0xf4e4c8, emissive:0x332a18, roughness:0.6 });
const sidewalkMat = new THREE.MeshStandardMaterial({ color:0x8a8378, roughness:0.9 });

const roadSegments = [];
function makeRoadSegment(zCenter){
  const g = new THREE.Group();
  const road = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_WIDTH, SEGMENT_LEN), roadMat);
  road.rotation.x = -Math.PI/2;
  road.receiveShadow = true;
  g.add(road);

  for(const lx of [-2.25, 2.25]){
    for(let s=-SEGMENT_LEN/2+3; s<SEGMENT_LEN/2; s+=8){
      const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 3.2), lineMat);
      dash.rotation.x = -Math.PI/2;
      dash.position.set(lx, 0.01, s);
      g.add(dash);
    }
  }
  for(const side of [-1,1]){
    const sw = new THREE.Mesh(new THREE.PlaneGeometry(4, SEGMENT_LEN), sidewalkMat);
    sw.rotation.x = -Math.PI/2;
    sw.position.set(side*(ROAD_WIDTH/2+2), 0.02, 0);
    sw.receiveShadow = true;
    g.add(sw);
  }

  const texVariants = [buildingTexA, buildingTexB, buildingTexC];
  for(const side of [-1,1]){
    let cursor = -SEGMENT_LEN/2;
    while(cursor < SEGMENT_LEN/2){
      const w = 5 + Math.random()*4;
      const h = 10 + Math.random()*26;
      const d = 8 + Math.random()*6;
      const tex = texVariants[Math.floor(Math.random()*texVariants.length)].clone();
      tex.repeat.set(Math.max(1,Math.round(w/3)), Math.max(1,Math.round(h/6)));
      const mat = new THREE.MeshStandardMaterial({ map:tex, roughness:0.75, metalness:0.15 });
      const b = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
      b.position.set(side*(ROAD_WIDTH/2+5+d/2), h/2, cursor + w/2);
      b.castShadow = true; b.receiveShadow = true;
      g.add(b);
      cursor += w + 1.5 + Math.random()*3;
    }
  }

  for(let s=-SEGMENT_LEN/2; s<SEGMENT_LEN/2; s+=20){
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,5,6), new THREE.MeshStandardMaterial({color:0x1a1a1a}));
    pole.position.set(-(ROAD_WIDTH/2+0.6), 2.5, s);
    pole.castShadow = true;
    g.add(pole);
    const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8), new THREE.MeshStandardMaterial({color:0xffe9b0, emissive:0xffcf6b, emissiveIntensity:1.2}));
    lamp.position.set(-(ROAD_WIDTH/2+0.6), 5, s);
    g.add(lamp);
  }

  g.position.z = zCenter;
  scene.add(g);
  return g;
}
for(let i=0;i<SEGMENTS_AHEAD;i++) roadSegments.push(makeRoadSegment(-i*SEGMENT_LEN));

// ---------- car factory ----------
function buildCar(bodyColor, isPlayer){
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color:bodyColor, roughness:0.35, metalness:0.6 });
  const glassMat = new THREE.MeshStandardMaterial({ color:0x1b2430, roughness:0.15, metalness:0.4 });
  const darkMat = new THREE.MeshStandardMaterial({ color:0x161616, roughness:0.7 });

  const base = new THREE.Mesh(new THREE.BoxGeometry(1.9,0.5,4.2), bodyMat);
  base.position.y = 0.55; base.castShadow = true; g.add(base);

  const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6,0.55,2.1), bodyMat);
  cabin.position.set(0,1.0,-0.2); cabin.castShadow = true; g.add(cabin);

  const windshield = new THREE.Mesh(new THREE.BoxGeometry(1.5,0.5,1.9), glassMat);
  windshield.position.set(0,1.0,-0.2); g.add(windshield);

  const hood = new THREE.Mesh(new THREE.BoxGeometry(1.85,0.15,1.4), bodyMat);
  hood.position.set(0,0.85,1.7); g.add(hood);

  const wheelGeo = new THREE.CylinderGeometry(0.42,0.42,0.35,14);
  const wheelPositions = [[-1.0,0.42,1.35],[1.0,0.42,1.35],[-1.0,0.42,-1.35],[1.0,0.42,-1.35]];
  wheelPositions.forEach(p=>{
    const w = new THREE.Mesh(wheelGeo, darkMat);
    w.rotation.z = Math.PI/2;
    w.position.set(p[0],p[1],p[2]);
    w.castShadow = true;
    g.add(w);
  });

  if(isPlayer){
    const lightMat = new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xfff2c2, emissiveIntensity:2 });
    [[-0.65,0.6,2.05],[0.65,0.6,2.05]].forEach(p=>{
      const l = new THREE.Mesh(new THREE.SphereGeometry(0.14,8,8), lightMat);
      l.position.set(p[0],p[1],p[2]);
      g.add(l);
    });
    const tailMat = new THREE.MeshStandardMaterial({ color:0x550000, emissive:0xff2222, emissiveIntensity:1.4 });
    [[-0.65,0.6,-2.05],[0.65,0.6,-2.05]].forEach(p=>{
      const l = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.14,0.06), tailMat);
      l.position.set(p[0],p[1],p[2]);
      g.add(l);
    });
  }

  return g;
}

// player is a container Group so physics code below can always drive
// player.position / player.rotation.y, regardless of which visual
// (procedural car or loaded .glb) is inside it.
const player = new THREE.Group();
scene.add(player);
player.position.set(0, 0, 0);

const proceduralCar = buildCar(0xd8432e, true);
player.add(proceduralCar);

if(CAR_MODEL_URL){
  const loader = new THREE.GLTFLoader();
  loader.load(
    CAR_MODEL_URL,
    (gltf)=>{
      console.log("MODEL LOADED!", gltf);

    const model = gltf.scene;

    model.scale.set(1,1,1);   // temporarily make it huge
    model.position.set(0, CAR_MODEL_Y_OFFSET, 0);
    model.rotation.y = 0;

    player.remove(proceduralCar);
    player.add(model);
    },
    undefined,
    (err)=>{
  console.error("GLB LOAD FAILED");
  console.error(err);
}
  );
}

// spotlight headlights following player subtly for extra glow at dusk
const headlightGlow = new THREE.PointLight(0xffdca0, 0.6, 8);
headlightGlow.position.set(0, 1, 3);
player.add(headlightGlow);

// ---------- traffic ----------
const trafficColors = [0x3a6ea5, 0x2f8f5b, 0xb8b8b8, 0x5a4a8a, 0xd9a441];
const trafficCars = [];
const TRAFFIC_COUNT = 9;
function spawnTrafficAt(z){
  const color = trafficColors[Math.floor(Math.random()*trafficColors.length)];
  const car = buildCar(color, false);
  const lane = LANE_X[Math.floor(Math.random()*LANE_X.length)];
  car.position.set(lane, 0, z);
  car.userData.speed = 6 + Math.random()*4;
  car.userData.lane = lane;
  scene.add(car);
  trafficCars.push(car);
}
for(let i=0;i<TRAFFIC_COUNT;i++) spawnTrafficAt(-30 - i*32 - Math.random()*20);

// ---------- coins ----------
const coinGeo = new THREE.TorusGeometry(0.5,0.18,10,20);
const coinMat = new THREE.MeshStandardMaterial({ color:0xffd479, emissive:0x7a5518, roughness:0.25, metalness:0.85 });
const coins = [];
const COIN_COUNT = 40;
function spawnCoinAt(z){
  const coin = new THREE.Mesh(coinGeo, coinMat);
  const lane = LANE_X[Math.floor(Math.random()*LANE_X.length)] + (Math.random()*2-1);
  coin.position.set(lane, 1.1, z);
  coin.rotation.x = Math.PI/2;
  coin.castShadow = true;
  scene.add(coin);
  coins.push(coin);
}
for(let i=0;i<COIN_COUNT;i++) spawnCoinAt(-8 - i*11 - Math.random()*6);

// ---------- input ----------
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

// ---------- game state ----------
let score = 0;
let distance = 0;
let speed = 0;
let heading = 0; // radians offset for visual drift
let steerX = 0;
let gameStarted = false;
let crashed = false;
let camShake = 0;

const MAX_SPEED = 34;
const ACCEL = 14;
const BRAKE = 26;
const FRICTION = 8;
const STEER_SPEED = 6.2;
const STEER_RANGE = ROAD_WIDTH/2 - 1.2;

const scoreVal = document.getElementById('scoreVal');
const speedVal = document.getElementById('speedVal');
const distVal = document.getElementById('distVal');
const instructions = document.getElementById('instructions');
const crashOverlay = document.getElementById('crashOverlay');
const finalScoreVal = document.getElementById('finalScoreVal');
const startOverlay = document.getElementById('startOverlay');
const popupLayer = document.getElementById('popupLayer');

document.getElementById('playBtn').addEventListener('click', ()=>{
  startOverlay.style.display = 'none';
  gameStarted = true;
  setTimeout(()=>{ instructions.style.opacity = '0'; }, 5000);
});
document.getElementById('restartBtn').addEventListener('click', resetGame);

function resetGame(){
  score = 0; distance = 0; speed = 0; steerX = 0; heading = 0; crashed = false;
  player.position.set(0,0,0);
  player.rotation.y = 0;
  trafficCars.forEach(c=>scene.remove(c));
  trafficCars.length = 0;
  for(let i=0;i<TRAFFIC_COUNT;i++) spawnTrafficAt(-30 - i*32 - Math.random()*20);
  coins.forEach(c=>scene.remove(c));
  coins.length = 0;
  for(let i=0;i<COIN_COUNT;i++) spawnCoinAt(-8 - i*11 - Math.random()*6);
  crashOverlay.style.display = 'none';
  scoreVal.textContent = '0';
}

function floatPopup(text, worldPos){
  const vec = worldPos.clone().project(camera);
  const x = (vec.x*0.5+0.5) * window.innerWidth;
  const y = (1-(vec.y*0.5+0.5)) * window.innerHeight;
  const el = document.createElement('div');
  el.className = 'floatPopup';
  el.style.left = x+'px'; el.style.top = y+'px';
  el.textContent = text;
  popupLayer.appendChild(el);
  setTimeout(()=>el.remove(), 950);
}

// ---------- main loop ----------
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if(gameStarted && !crashed){
    // acceleration
    if(keys['w'] || keys['arrowup']) speed = Math.min(MAX_SPEED, speed + ACCEL*dt);
    else if(keys['s'] || keys['arrowdown']) speed = Math.max(-MAX_SPEED*0.4, speed - BRAKE*dt);
    else {
      if(speed > 0) speed = Math.max(0, speed - FRICTION*dt);
      else speed = Math.min(0, speed + FRICTION*dt);
    }

    // steering (lateral position) — arcade: direct lateral control, sharper at speed
    let steerInput = 0;
    if(keys['a'] || keys['arrowleft']) steerInput = -1;
    if(keys['d'] || keys['arrowright']) steerInput = 1;
    const speedFactor = 0.35 + 0.65*(Math.abs(speed)/MAX_SPEED);
    steerX += steerInput * STEER_SPEED * speedFactor * dt;
    steerX = Math.max(-STEER_RANGE, Math.min(STEER_RANGE, steerX));

    // drift visual: tilt heading based on steer input & speed
    const targetHeading = -steerInput * 0.28 * speedFactor;
    heading += (targetHeading - heading) * Math.min(1, 8*dt);

    player.position.x += (steerX - player.position.x) * Math.min(1, 6*dt);
    player.position.z -= speed*dt;
    player.rotation.y = heading;

    distance += Math.max(0,speed)*dt;

    // recycle road segments
    roadSegments.forEach(seg=>{
      if(seg.position.z - player.position.z > SEGMENT_LEN){
        seg.position.z -= SEGMENT_LEN*SEGMENTS_AHEAD;
      }
    });

    // traffic update + recycle + collision
    trafficCars.forEach(car=>{
      car.position.z += car.userData.speed*dt;
      if(car.position.z - player.position.z > 20){
        car.position.z = player.position.z - (140 + Math.random()*60);
        car.userData.lane = LANE_X[Math.floor(Math.random()*LANE_X.length)];
        car.position.x = car.userData.lane;
      }
      const dx = Math.abs(car.position.x - player.position.x);
      const dz = Math.abs(car.position.z - player.position.z);
      if(dx < 1.5 && dz < 2.6){
        crashGame();
      }
    });

    // coins update + recycle + collect
    coins.forEach(coin=>{
      coin.rotation.y += dt*3;
      if(coin.position.z - player.position.z > 20){
        coin.position.z = player.position.z - (250 + Math.random()*180);
        coin.position.x = LANE_X[Math.floor(Math.random()*LANE_X.length)] + (Math.random()*2-1);
        coin.visible = true;
      }
      if(coin.visible){
        const dx = Math.abs(coin.position.x - player.position.x);
        const dz = Math.abs(coin.position.z - player.position.z);
        if(dx < 1.3 && dz < 1.8){
          coin.visible = false;
          score += 10;
          scoreVal.textContent = score;
          floatPopup('+10', coin.position.clone().add(new THREE.Vector3(0,1,0)));
        }
      }
    });

    // camera chase
    const camOffset = new THREE.Vector3(0, 3.4, 8.5);
    const desiredCamPos = player.position.clone().add(camOffset);
    desiredCamPos.x += Math.sin(heading)*1.5;
    camera.position.lerp(desiredCamPos, Math.min(1, 4*dt));
    const lookTarget = player.position.clone().add(new THREE.Vector3(0,1.1,-6));
    camera.lookAt(lookTarget);
    camera.fov = 62 + Math.min(10, Math.abs(speed)*0.25);
    camera.updateProjectionMatrix();

    // sky/fog subtle parallax not needed; sun tracks car
    sun.position.set(player.position.x-40, 35, player.position.z-20);
    sun.target.position.copy(player.position);
    sun.target.updateMatrixWorld();

    speedVal.textContent = Math.round(Math.abs(speed)*3.2);
    distVal.textContent = Math.round(distance);
  } else if(crashed){
    camShake = Math.max(0, camShake - dt);
    camera.position.x += (Math.random()-0.5)*camShake*2;
    camera.position.y += (Math.random()-0.5)*camShake*2;
  }

  renderer.render(scene, camera);
}

function crashGame(){
  if(crashed) return;
  crashed = true;
  camShake = 0.5;
  finalScoreVal.textContent = score;
  crashOverlay.style.display = 'flex';
}

animate();
})();
</script>
